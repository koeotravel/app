image: node:11.11.0

cache:
  paths:
    - node_modules/

test:
  stage: test
  script:
    - npm run lint

deploy_staging:
  stage: deploy
  environment:
    name: staging
    url: https://app.koeo.now.sh
  before_script:
    - npm i -g --silent --unsafe-perm now
    - npm i -g --silent @vue/cli
    - npm i
  script:
    - now -b VUE_APP_FIREBASE_API_KEY=$VUE_APP_FIREBASE_API_KEY -b VUE_APP_FIREBASE_AUTH_DOMAIN=$VUE_APP_FIREBASE_AUTH_DOMAIN -b VUE_APP_FIREBASE_DATABASE_URL=$VUE_APP_FIREBASE_DATABASE_URL -b VUE_APP_FIREBASE_PROJECT_ID=$VUE_APP_FIREBASE_PROJECT_ID -b VUE_APP_FIREBASE_STORAGE_BUCKET=$VUE_APP_FIREBASE_STORAGE_BUCKET -b VUE_APP_FIREBASE_MESSAGING_SENDER_ID=$VUE_APP_FIREBASE_MESSAGING_SENDER_ID --target staging --token $NOW_TOKEN
  only:
    - develop
