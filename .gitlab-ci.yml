image: node:11.11.0

cache:
  paths:
    - node_modules/

lint:
  stage: test
  script:
    - npm run lint

deploy_staging:
  stage: deploy
  variables:
    VUE_APP_FIREBASE_API_KEY: $VUE_APP_FIREBASE_API_KEY
    VUE_APP_FIREBASE_AUTH_DOMAIN: $VUE_APP_FIREBASE_AUTH_DOMAIN
    VUE_APP_FIREBASE_DATABASE_URL: $VUE_APP_FIREBASE_DATABASE_URL
    VUE_APP_FIREBASE_PROJECT_ID: $VUE_APP_FIREBASE_PROJECT_ID
    VUE_APP_FIREBASE_STORAGE_BUCKET: $VUE_APP_FIREBASE_STORAGE_BUCKET
    VUE_APP_FIREBASE_MESSAGING_SENDER_ID: $VUE_APP_FIREBASE_MESSAGING_SENDER_ID
    NOW_TOKEN: $NOW_TOKEN
  environment:
    name: staging
    url: https://app-staging.koeo.co
  before_script:
    - npm install -g --unsafe-perm now
    - npm install -g @vue/cli
    - npm install
    - now secret add api-key $VUE_APP_FIREBASE_API_KEY --token $NOW_TOKEN
    - now secret add auth-domain $VUE_APP_FIREBASE_AUTH_DOMAIN --token $NOW_TOKEN
    - now secret add database-url $VUE_APP_FIREBASE_DATABASE_URL --token $NOW_TOKEN
    - now secret add project-id $VUE_APP_FIREBASE_PROJECT_ID --token $NOW_TOKEN
    - now secret add storage-bucket $VUE_APP_FIREBASE_STORAGE_BUCKET --token $NOW_TOKEN
    - now secret add messaging-sender-id $VUE_APP_FIREBASE_MESSAGING_SENDER_ID --token $NOW_TOKEN
  script:
    - now --token $NOW_TOKEN
  only:
    - develop
